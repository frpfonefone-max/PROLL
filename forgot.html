<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نسيت كلمة المرور - متجر الحسام للإلكترونيات</title>
     <link rel="stylesheet" href="css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="images/favicon.ico" type="image/x-icon">
</head>
<body>
    <!-- الهيدر (الرأس) -->
    <header>
        <div class="container header-container">
            <div class="logo">
              <span class="navbar-brand logo-text  fw-bold d-flex align-items-center" href="index.html" >
        <img src="الشعار.png" width="45" class="ms-2 logo-spin ra ">
        متجر الحسام
      </span>
            </div>
        </div>
    </header>



    
    <!-- محتوى صفحة نسيت كلمة المرور -->
    <main class="page-content">
        <div class="form-container">
            <h2>استعادة كلمة المرور</h2>
            
            <p style="text-align: center; margin-bottom: 20px; color: #666;">
                أدخل بريدك الإلكتروني وسنرسل لك رابطاً لإعادة تعيين كلمة المرور الخاصة بحسابك.
            </p>
            
            <form action="#" method="post">
                <div class="form-group">
                    <label for="email">البريد الإلكتروني</label>
                    <input type="email" id="email" name="email" class="form-control" required placeholder="أدخل بريدك الإلكتروني المسجل">
                </div>
                
                <button type="submit" class="btn btn-block">إرسال رابط الاستعادة</button>
            </form>
            
            <div class="form-links">
                <p>تذكرت كلمة المرور؟ <a href="login.html">تسجيل الدخول</a></p>
                <p>ليس لديك حساب؟ <a href="register.html">إنشاء حساب جديد</a></p>
                <p><a href="home.html">العودة للرئيسية</a></p>
            </div>
        </div>
    </main>


     <script src="js/bootstrap.bundle.min.js"></script>
</body>
</html>
