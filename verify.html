<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>التحقق من الحساب - متجر الحسام للإلكترونيات</title>
     <link rel="stylesheet" href="css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="images/favicon.ico" type="image/x-icon">
</head>
<body>
    <!-- الهيدر (الرأس) -->
    <header>
        <div class="container header-container">
            <div class="logo">
              <span class="navbar-brand logo-text  fw-bold d-flex align-items-center" href="home.html" >
        <img src="الشعار.png" width="45" class="ms-2 logo-spin ra ">
        متجر الحسام
      </span>
            </div>
            
        </div>
    </header>




    <!-- محتوى صفحة التحقق -->
    <main class="page-content">
        <div class="form-container">
            <h2>التحقق من الحساب</h2>
            
            <p style="text-align: center; margin-bottom: 20px; color: #666;">
                لقد أرسلنا رمز تحقق مكون من 6 أرقام إلى بريدك الإلكتروني. يرجى إدخال الرمز أدناه للتحقق من حسابك.
            </p>
            
            <form action="success.html" method="post">
                <div class="form-group">
                    <label for="verification-code">رمز التحقق</label>
                    <input type="text" id="verification-code" name="verification-code" class="form-control" required placeholder="أدخل الرمز المكون من 6 أرقام" maxlength="6" pattern="[0-9]{6}">
                </div>
                
                <button type="submit" class="btn btn-block">التحقق من الحساب</button>
            </form>
            
            <div class="form-links">
                <p>لم تستلم الرمز؟ <a href="#">إعادة إرسال الرمز</a></p>
                <p><a href="register.html">العودة لإنشاء الحساب</a></p>
                <p><a href="home.html">العودة للرئيسية</a></p>
            </div>
        </div>
    </main>


     <script src="js/bootstrap.bundle.min.js"></script>
</body>
</html>
