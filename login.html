<!DOCTYPE html> 
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - متجر الحسام للإلكترونيات</title>
     <link rel="stylesheet" href="css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="css/style.css">
   <!-- <link rel="icon" href="images/favicon.ico" type="image/x-icon">-->
</head>
<body>
   

    <!-- محتوى صفحة تسجيل الدخول -->
    <main class="page-content">
        <div class="form-container" style="box-shadow: 0px 0px 10px rgb(40, 11, 67);">
        
         <center> <img src="الشعار.png" class="ico-login" width="30%" height="10%" alt=""  ></center>
            <h2>تسجيل الدخول</h2>
            
            <form action="index.html" method="post">
                <div class="form-group">
                    <label for="email">البريد الإلكتروني</label>
                    <input type="email" id="email" name="email" class="form-control" required placeholder="أدخل بريدك الإلكتروني">
                </div>
                
                <div class="form-group">
                    <label for="password">كلمة المرور</label>
                    <input type="password" id="password" name="password" class="form-control" required placeholder="أدخل كلمة المرور">
                </div>
                
                <button type="submit" class="btn btn-block">تسجيل الدخول</button>

               
            </form>
            
            <div class="form-links">
                <p>ليس لديك حساب؟ <a href="register.html">إنشاء حساب جديد</a></p>
                <p><a href="forgot.html">نسيت كلمة المرور؟</a></p>
                <p><a href="index.html">العودة للرئيسية</a></p>
                <p><a href="admin2/loginAdmin.html">LOGIN-ADMIN</a></p>
            </div>
        </div>
    </main>

  <script src="js/bootstrap.bundle.min.js"></script>
</body>
</html>
